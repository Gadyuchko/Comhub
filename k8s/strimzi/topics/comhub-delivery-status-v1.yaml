apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: comhub.delivery.status.v1
  namespace: kafka
  labels:
    strimzi.io/cluster: comhub
spec:
  # 6 partitions -- lower throughput than main pipeline topics
  partitions: 6
  replicas: 3
  config:
    # Events live for 24h, after that Kafka deletes them automatically
    retention.ms: 86400000
